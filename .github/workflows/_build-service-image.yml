name: Build Service Image

on:
  workflow_call:
    inputs:
      service-name:
        description: Service name (e.g., api, web)
        type: string
        required: true
      dockerfile-path:
        description: Path to Dockerfile
        type: string
        required: true
      build-context:
        description: Docker build context path
        type: string
        default: '.'
      registry:
        description: Container registry URL
        type: string
        default: ''
      push:
        description: Push image to registry
        type: boolean
        default: false
    outputs:
      image-tag:
        description: Full image tag (registry/name:sha)
        value: ${{ jobs.build.outputs.image-tag }}
      image-digest:
        description: Image digest
        value: ${{ jobs.build.outputs.image-digest }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: |
            ${{ inputs.registry && format('{0}/{1}', inputs.registry, inputs.service-name) || format('e-clat-{0}', inputs.service-name) }}
          tags: |
            type=sha,prefix=,format=long
            type=ref,event=branch
            type=ref,event=pr
      
      - name: Build Docker image
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ${{ inputs.build-context }}
          file: ${{ inputs.dockerfile-path }}
          push: ${{ inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/${{ inputs.service-name }}-${{ github.sha }}.tar
      
      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ inputs.service-name }}-image-${{ github.sha }}
          path: /tmp/${{ inputs.service-name }}-${{ github.sha }}.tar
          retention-days: 7
