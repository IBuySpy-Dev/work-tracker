name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  TF_IN_AUTOMATION: "true"
  AZURE_CLIENT_ID: ${{ inputs.environment == 'dev' && secrets.AZURE_CLIENT_ID_DEV || inputs.environment == 'staging' && secrets.AZURE_CLIENT_ID_STAGING || secrets.AZURE_CLIENT_ID_PROD }}
  AZURE_TENANT_ID: ${{ inputs.environment == 'dev' && secrets.AZURE_TENANT_ID_DEV || inputs.environment == 'staging' && secrets.AZURE_TENANT_ID_STAGING || secrets.AZURE_TENANT_ID_PROD }}
  AZURE_SUBSCRIPTION_ID: ${{ inputs.environment == 'dev' && secrets.AZURE_SUBSCRIPTION_ID_DEV || inputs.environment == 'staging' && secrets.AZURE_SUBSCRIPTION_ID_STAGING || secrets.AZURE_SUBSCRIPTION_ID_PROD }}

jobs:
  foundation:
    name: Deploy foundation (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: azure/login@eec3c95657c1536435858eda1f3ff5437fee8474 # v2.3.0
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}
      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
      - name: Terraform init
        working-directory: infra/layers/00-foundation
        run: terraform init -input=false -backend-config="../../environments/${{ inputs.environment }}/foundation.tfbackend"
      - name: Terraform plan
        working-directory: infra/layers/00-foundation
        run: terraform plan -input=false -out=tfplan -var-file="../../environments/${{ inputs.environment }}/foundation.tfvars"
      - name: Terraform apply
        working-directory: infra/layers/00-foundation
        run: terraform apply -input=false -auto-approve tfplan

  data:
    name: Deploy data (${{ inputs.environment }})
    runs-on: ubuntu-latest
    needs: foundation
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: azure/login@eec3c95657c1536435858eda1f3ff5437fee8474 # v2.3.0
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}
      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
      - name: Terraform init
        working-directory: infra/layers/10-data
        run: terraform init -input=false -backend-config="../../environments/${{ inputs.environment }}/data.tfbackend"
      - name: Terraform plan
        working-directory: infra/layers/10-data
        run: terraform plan -input=false -out=tfplan -var-file="../../environments/${{ inputs.environment }}/data.tfvars"
      - name: Terraform apply
        working-directory: infra/layers/10-data
        run: terraform apply -input=false -auto-approve tfplan

  compute:
    name: Deploy compute (${{ inputs.environment }})
    runs-on: ubuntu-latest
    needs: data
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write
    outputs:
      api_container_app_name: ${{ steps.capture.outputs.api_container_app_name }}
      api_url: ${{ steps.capture.outputs.api_url }}
      acr_login_server: ${{ steps.capture.outputs.acr_login_server }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: azure/login@eec3c95657c1536435858eda1f3ff5437fee8474 # v2.3.0
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}
      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
      - name: Terraform init
        working-directory: infra/layers/20-compute
        run: terraform init -input=false -backend-config="../../environments/${{ inputs.environment }}/compute.tfbackend"
      - name: Terraform plan
        working-directory: infra/layers/20-compute
        run: terraform plan -input=false -out=tfplan -var-file="../../environments/${{ inputs.environment }}/compute.tfvars"
      - name: Terraform apply
        working-directory: infra/layers/20-compute
        run: terraform apply -input=false -auto-approve tfplan
      - name: Capture compute outputs
        id: capture
        working-directory: infra/layers/20-compute
        run: |
          echo "api_container_app_name=$(terraform output -raw api_container_app_name)" >> "$GITHUB_OUTPUT"
          echo "api_url=$(terraform output -raw api_url)" >> "$GITHUB_OUTPUT"
          echo "acr_login_server=$(terraform output -raw acr_login_server)" >> "$GITHUB_OUTPUT"

  deploy-api:
    name: Deploy API (${{ inputs.environment }})
    runs-on: ubuntu-latest
    needs: compute
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: azure/login@eec3c95657c1536435858eda1f3ff5437fee8474 # v2.3.0
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}
      - name: Deploy container image to ACA
        run: |
          az containerapp update \
            --name ${{ needs.compute.outputs.api_container_app_name }} \
            --resource-group eclat-${{ inputs.environment }}-rg \
            --image ${{ needs.compute.outputs.acr_login_server }}/e-clat-api:${{ github.sha }}
      - name: Deployment summary
        run: echo "API deployed to ${{ needs.compute.outputs.api_url }}"

  smoke-checks:
    name: Smoke Deploy Checks
    needs: deploy-api
    uses: ./.github/workflows/smoke-deploy.yml
    with:
      environment: ${{ inputs.environment }}
      api_url: ${{ needs.compute.outputs.api_url }}
    secrets: inherit
